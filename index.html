
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUR AI - FRANKLIN OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-accent: #00FF88;
            --neon-accent-rgb: 0, 255, 136;
            --liquid-bg: #141e16;
            --glow-intensity: 1;
            --pulse-speed: 4s;
            --glass-transparency: 0.85;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--liquid-bg);
            color: #e8f5ec;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }

        .glow-accent {
            text-shadow: 0 0 10px var(--neon-accent), 0 0 25px rgba(var(--neon-accent-rgb), 0.4);
            color: #fff !important;
        }

        .glass-panel {
            background: rgba(20, 32, 24, 0.55);
            backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(var(--neon-accent-rgb), 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .glass-column {
            background: rgba(16, 28, 20, 0.5);
            backdrop-filter: blur(20px) saturate(1.3);
            border-color: rgba(var(--neon-accent-rgb), 0.12);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(var(--neon-accent-rgb), 0.8); }
            50% { opacity: 0.5; box-shadow: 0 0 8px rgba(var(--neon-accent-rgb), 0.4); }
        }

        .animate-pulse-dot {
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fade-in 0.3s ease-out forwards;
        }

        /* Subtle scrollbar for panels */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(var(--neon-accent-rgb), 0.2); border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(var(--neon-accent-rgb), 0.4); }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

</head>

</html>
